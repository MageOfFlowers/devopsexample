name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Lint/Test
        run: npm test || echo "No tests defined"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Sửa lại cho đúng
          password: ${{ secrets.DOCKER_PASSWORD }} # Sửa lại cho đúng

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: hkduy/devopsexample:latest

  deploy-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }} # Sửa lại cho đồng bộ
          password: ${{ secrets.DOCKER_PASSWORD }} # Sửa lại cho đồng bộ

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: . # Nên thêm context để build chắc chắn hơn
          push: true
          tags: hkduy/devopsexample:latest # Sửa lại cho khớp với tên image ở trên